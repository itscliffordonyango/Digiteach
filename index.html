    <link rel="stylesheDigital Confidence Initiative / DigiTeach Website Initial UI, Content and UX Notes 1. Overall Direction The first UI direction feels warm, credible, education-focused and aligned with the general tone we discussed. The use of dark navy, teal, learning green accents and human photography is working well. DigiTeach is visible across the experience, which is important because it is the first public-facing programme under the Digital Confidence Initiative. These notes are mainly refinements around spacing, background colour, brand hierarchy and user pathways rather than a change in the overall direction. 2. Background and Spacing The current site feels a little too white in some areas, and the homepage could benefit from more breathing room, especially in the top section. I would like the background to move slightly closer to the warm paper cream direction from the brand palette. Please try #FCF9F3 for the main background so the site feels slightly creamier and less stark. Learning Lime #A6E36F can then be used more selectively for small energetic highlights, such as the Get Involved button, arrows, small accent marks or key interactive moments. The goal is for the site to feel warm, guided and easy to move through, with enough spacing around the hero, feature areas, learning cards and section transitions. 3. Brand Hierarchy The main umbrella brand should be: Digital Confidence Initiative DigiTeach should be positioned as: DigiTeach, the flagship teacher digital confidence programme of the Digital Confidence Initiative. 1I like the messaging in the hero section. Visually, we could consider inverting the current colour treatment so that the messaging sits in Deep Indigo against a porcelain/off-white background, instead of using the dark blue as the full hero background. Suggested hierarchy: • • • • • Website logo / header identity: Digital Confidence Initiative Featured programme block: DigiTeach (similar to what is currently in the hero) Footer: DigiTeach can remain visible, but the umbrella brand should also be clear Suggested footer copy: Current pilot: DigiTeach Programme pages can include more explanation of what DigiTeach is, who it serves and what teachers gain from it This helps the site communicate both the bigger mission and the practical first programme. 4. Learning Outcomes Section The “4 Practical Areas of Confidence” section is very important and should remain high on the homepage. Suggested title: 4 Practical Areas of Confidence Suggested subtitle: DigiTeach helps educators build confidence in the everyday digital tasks that support teaching, administration and safe online participation. Learning cards: 1. 2. 3. 4. Digital Foundations Computer basics, mouse and keyboard use, typing practice, files, folders, naming, saving and finding documents. Internet, Email and Cloud Confidence Browsers, search, Gmail, passwords, attachments, downloads, uploads and Google Drive. Teacher Productivity Docs, Sheets and Slides for lesson notes, tests, reports, marksheets and simple presentations. Digital Safety Scams, phishing, fake links, mobile money fraud, AI-generated misinformation, password hygiene and safer online behaviour. 25. Get Involved Sectionet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
